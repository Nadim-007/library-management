<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">Books</h4>
        <a th:href="@{/books/add}" sec:authorize="hasRole('ADMIN')" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg me-1"></i> Add Book
        </a>
    </div>

    <form th:action="@{/books/search}" method="get" class="d-flex gap-2 mb-3">
        <input type="text" name="keyword" class="form-control form-control-sm w-auto"
               placeholder="Search title or author..." th:value="${keyword}"/>
        <button class="btn btn-outline-secondary btn-sm"><i class="bi bi-search"></i> Search</button>
        <a th:href="@{/books/list}" class="btn btn-outline-secondary btn-sm">Clear</a>
    </form>

    <div class="card">
        <table class="table table-hover mb-0">
            <thead>
                <tr><th>#</th><th>Title</th><th>Author</th><th>Genre</th><th>Total</th><th>Available</th><th>Actions</th></tr>
            </thead>
            <tbody>
                <tr th:each="book, stat : ${books}">
                    <td th:text="${stat.count}"></td>
                    <td th:text="${book.title}"></td>
                    <td th:text="${book.author.firstName + ' ' + book.author.lastName}"></td>
                    <td th:text="${book.genre ?: '-'}"></td>
                    <td th:text="${book.totalCopies}"></td>
                    <td>
                        <span th:text="${book.availableCopies}"
                              th:classappend="${book.availableCopies == 0} ? 'text-danger fw-bold' : 'text-success fw-bold'"></span>
                    </td>
                    <td>
                        <a th:href="@{/books/edit/{id}(id=${book.id})}" sec:authorize="hasRole('ADMIN')" class="btn btn-sm btn-outline-primary me-1">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a th:href="@{/books/delete/{id}(id=${book.id})}" sec:authorize="hasRole('ADMIN')" class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Delete this book?')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(books)}">
                    <td colspan="7" class="text-center text-muted py-4">No books found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
