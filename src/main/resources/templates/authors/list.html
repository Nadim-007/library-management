<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0">Authors</h4>
        <a th:href="@{/authors/add}" sec:authorize="hasRole('ADMIN')" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg me-1"></i> Add Author
        </a>
    </div>

    <!-- Search -->
    <form th:action="@{/authors/search}" method="get" class="d-flex gap-2 mb-3">
        <input type="text" name="keyword" class="form-control form-control-sm w-auto"
               placeholder="Search by last name..." th:value="${keyword}"/>
        <button class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-search"></i> Search
        </button>
        <a th:href="@{/authors/list}" class="btn btn-outline-secondary btn-sm">Clear</a>
    </form>

    <div class="card">
        <table class="table table-hover mb-0">
            <thead>
                <tr><th>#</th><th>First Name</th><th>Last Name</th><th>Nationality</th><th>Actions</th></tr>
            </thead>
            <tbody>
                <tr th:each="author, stat : ${authors}">
                    <td th:text="${stat.count}"></td>
                    <td th:text="${author.firstName}"></td>
                    <td th:text="${author.lastName}"></td>
                    <td th:text="${author.nationality ?: '-'}"></td>
                    <td>
                        <a th:href="@{/authors/edit/{id}(id=${author.id})}" sec:authorize="hasRole('ADMIN')" class="btn btn-sm btn-outline-primary me-1">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a th:href="@{/authors/delete/{id}(id=${author.id})}" sec:authorize="hasRole('ADMIN')" class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Delete this author?')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(authors)}">
                    <td colspan="5" class="text-center text-muted py-4">No authors found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
