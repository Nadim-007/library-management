<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<body>
<div layout:fragment="content">
    <div class="d-flex align-items-center gap-2 mb-4">
        <a th:href="@{/authors/list}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h4 class="fw-bold mb-0" th:text="${author.id != null} ? 'Edit Author' : 'Add Author'"></h4>
    </div>

    <div class="card p-4" style="max-width:500px">
        <form th:action="${author.id != null} ? @{/authors/edit/{id}(id=${author.id})} : @{/authors/add}"
              th:object="${author}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">First Name</label>
                <input type="text" th:field="*{firstName}" class="form-control"
                       th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"/>
                <div class="invalid-feedback" th:errors="*{firstName}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Last Name</label>
                <input type="text" th:field="*{lastName}" class="form-control"
                       th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"/>
                <div class="invalid-feedback" th:errors="*{lastName}"></div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Nationality</label>
                <input type="text" th:field="*{nationality}" class="form-control" placeholder="e.g. Indian"/>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <span th:text="${author.id != null} ? 'Update Author' : 'Save Author'"></span>
            </button>
        </form>
    </div>
</div>
</body>
</html>
